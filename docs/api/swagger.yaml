openapi: 3.0.3
info:
  title: Tutorty Backend API
  version: 2.0.0
  description: Complete Phase 2 backend API for authentication, authorization, subscriptions, bookings, academy enrollment, withdrawals, chat, reviews, and discovery.
servers:
  - url: http://localhost:4001
    description: Local development
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [email, password, role]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          description: Must include uppercase, lowercase, number, and symbol.
        role:
          type: string
          enum: [student, tutor, academy]
        name:
          type: string
        academy_name:
          type: string
        city:
          type: string
        country:
          type: string
        phone:
          type: string
        bio:
          type: string
        education_level:
          type: string
        education_history:
          type: string
        work_history:
          type: string
        teaching_mode:
          type: string
          enum: [online, physical, hybrid]
        profile_picture_url:
          type: string
        description:
          type: string
        logo_url:
          type: string
        about:
          type: string
        founded_year:
          type: integer
        owner_name:
          type: string
      example:
        email: student.demo@example.com
        password: DemoPass1!
        role: student
        name: Student Demo
        city: Lahore
        country: Pakistan
        phone: "03001234567"
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      example:
        email: student.demo@example.com
        password: DemoPass1!
    LogoutRequest:
      type: object
      properties:
        refresh_token:
          type: string
      example:
        refresh_token: "<supabase_refresh_token>"
    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
      example:
        email: student.demo@example.com
    ResetPasswordRequest:
      type: object
      required: [access_token, refresh_token, new_password]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        new_password:
          type: string
          minLength: 8
          description: Must include uppercase, lowercase, number, and symbol.
      example:
        access_token: "<supabase_recovery_access_token>"
        refresh_token: "<supabase_recovery_refresh_token>"
        new_password: NewPass1!
    SubscriptionPurchaseRequest:
      type: object
      required: [plan_type]
      properties:
        plan_type:
          type: string
          enum: [1m, 3m, 1y]
        start_date:
          type: string
          format: date
      example:
        plan_type: 1m
    StudentTopupRequest:
      type: object
      required: [amount]
      properties:
        amount:
          type: number
          minimum: 0.01
      example:
        amount: 3000
    BookSessionRequest:
      type: object
      required: [tutor_id, date, slot_id]
      properties:
        tutor_id:
          type: integer
        date:
          type: string
          format: date
        slot_id:
          type: string
          enum: [s1, s2, s3, s4]
      example:
        tutor_id: 41
        date: "2026-03-20"
        slot_id: s2
    ConfirmSessionRequest:
      type: object
      required: [confirmed]
      properties:
        confirmed:
          type: boolean
      example:
        confirmed: true
    WithdrawalRequest:
      type: object
      required: [amount, provider, account_title, account_number]
      properties:
        amount:
          type: number
          minimum: 0.01
        provider:
          type: string
          enum: [bank, jazzcash, easypaisa]
        account_title:
          type: string
        account_number:
          type: string
        destination_note:
          type: string
      example:
        amount: 500
        provider: jazzcash
        account_title: Tutor Demo
        account_number: "03001234567"
        destination_note: Monthly payout simulation
    WithdrawalReviewRequest:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [approved, rejected]
        review_note:
          type: string
      example:
        decision: approved
        review_note: Approved by admin after review
    AcademyEnrollRequest:
      type: object
      required: [academy_id, course_id]
      properties:
        academy_id:
          type: integer
        course_id:
          type: integer
      example:
        academy_id: 7
        course_id: 15
    ChatSendRequest:
      type: object
      required: [receiver_account_id, content]
      properties:
        receiver_account_id:
          type: integer
        content:
          type: string
      example:
        receiver_account_id: 21
        content: Hello, I want to discuss tomorrow's class.
    ReviewCreateRequest:
      type: object
      required: [booking_id, rating]
      properties:
        booking_id:
          type: integer
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
      example:
        booking_id: 12
        rating: 5
        comment: Very helpful session.
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              nullable: true
      example:
        success: false
        error:
          code: VALIDATION_ERROR
          message: Invalid request payload
          details:
            - "\"email\" is required"
paths:
  /api/v1/auth/register:
    post:
      summary: Register user via Supabase and create local role profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registered
        '400':
          description: Validation or Supabase signup failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Duplicate backend email
  /api/v1/auth/login:
    post:
      summary: Login via Supabase email/password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/auth/resend-verification:
    post:
      summary: Resend email verification link via Supabase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
              example:
                email: student.demo@example.com
      responses:
        '200':
          description: Verification email resent
        '400':
          description: Validation error or resend failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/auth/forgot-password:
    post:
      summary: Send password reset email via Supabase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Reset email flow triggered
        '400':
          description: Validation error or reset email failure
  /api/v1/auth/reset-password:
    post:
      summary: Reset password using Supabase recovery access and refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset completed
        '400':
          description: Validation error or invalid recovery session
  /api/v1/auth/me:
    get:
      summary: Get current user from token + local role profile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/auth/logout:
    post:
      summary: Logout current session and optionally revoke Supabase refresh token
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Logout accepted
        '400':
          description: Validation error or sign-out revoke failure
        '401':
          description: Missing or invalid token
  /api/v1/auth/rbac/student:
    get:
      summary: RBAC test route for student
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Allowed
        '403':
          description: Forbidden
  /api/v1/auth/rbac/tutor:
    get:
      summary: RBAC test route for tutor
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Allowed
        '403':
          description: Forbidden
  /api/v1/auth/rbac/academy:
    get:
      summary: RBAC test route for academy
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Allowed
        '403':
          description: Forbidden
  /api/v1/auth/rbac/admin:
    get:
      summary: RBAC test route for admin
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Allowed
        '403':
          description: Forbidden
  /api/v1/subscriptions/tutor/purchase:
    post:
      summary: Purchase tutor subscription (transactional)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionPurchaseRequest'
      responses:
        '201':
          description: Subscription purchased and wallet deducted
        '400':
          description: Validation error
        '401':
          description: Missing or invalid token
        '403':
          description: Forbidden for non-tutor role
        '409':
          description: Insufficient balance or active subscription already exists
  /api/v1/subscriptions/plans:
    get:
      summary: List available tutor subscription plans
      responses:
        '200':
          description: Plans fetched
  /api/v1/subscriptions/tutor/status:
    get:
      summary: Get tutor wallet and active-subscription status with next action hint
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Tutor status fetched
        '401':
          description: Missing or invalid token
        '403':
          description: Forbidden for non-tutor role
  /api/v1/subscriptions/tutor/topup:
    post:
      summary: Top up tutor wallet
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount:
                  type: number
                  minimum: 0.01
              example:
                amount: 5000
      responses:
        '201':
          description: Wallet topped up
        '400':
          description: Invalid top-up amount
        '401':
          description: Missing or invalid token
        '403':
          description: Forbidden for non-tutor role
  /api/v1/subscriptions/tutor/my:
    get:
      summary: Get tutor wallet and subscription history
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Tutor subscriptions fetched
        '401':
          description: Missing or invalid token
        '403':
          description: Forbidden for non-tutor role
  /api/v1/subscriptions/academy/status:
    get:
      summary: Get academy wallet and active monthly-subscription status
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Academy status fetched
        '401':
          description: Missing or invalid token
        '403':
          description: Forbidden for non-academy role
  /api/v1/subscriptions/academy/topup:
    post:
      summary: Top up academy wallet
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount:
                  type: number
                  minimum: 0.01
              example:
                amount: 25000
      responses:
        '201':
          description: Wallet topped up
  /api/v1/subscriptions/academy/purchase:
    post:
      summary: Purchase academy monthly subscription (fixed 20k)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionPurchaseRequest'
      responses:
        '201':
          description: Academy subscription purchased
        '409':
          description: Insufficient balance or active subscription already exists
  /api/v1/subscriptions/academy/my:
    get:
      summary: Get academy wallet and subscription history
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Academy subscriptions fetched
  /api/v1/sessions/slots/catalog:
    get:
      summary: Get fixed slot catalog and per-session price
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Slot catalog fetched
        '401':
          description: Missing or invalid token
        '403':
          description: Forbidden for non student/tutor roles
  /api/v1/sessions/tutors:
    get:
      summary: List tutors with active subscriptions (student booking list)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Tutors fetched
        '401':
          description: Missing or invalid token
        '403':
          description: Forbidden for non-student roles
  /api/v1/sessions/tutors/{tutorId}/slots:
    get:
      summary: Get tutor slots for a specific date with booked/unbooked state
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: tutorId
          required: true
          schema:
            type: integer
        - in: query
          name: date
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Slot availability fetched
        '400':
          description: Invalid tutor id or date
        '401':
          description: Missing or invalid token
        '403':
          description: Forbidden for non-student roles
  /api/v1/sessions/student/topup:
    post:
      summary: Top up student wallet
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentTopupRequest'
      responses:
        '201':
          description: Wallet topped up
        '400':
          description: Validation error (including past session date/time)
        '401':
          description: Missing or invalid token
        '403':
          description: Forbidden for non-student role
  /api/v1/sessions/bookings:
    post:
      summary: Book tutor session and hold payment in escrow
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookSessionRequest'
      responses:
        '201':
          description: Session booked and payment held
        '400':
          description: Validation error
        '401':
          description: Missing or invalid token
        '403':
          description: Forbidden for non-student role
        '404':
          description: Tutor or student profile not found
        '409':
          description: Insufficient balance or slot already booked
  /api/v1/sessions/bookings/my:
    get:
      summary: Get bookings for logged-in student or tutor
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Bookings fetched
        '401':
          description: Missing or invalid token
        '403':
          description: Forbidden for non student/tutor role
  /api/v1/sessions/bookings/{bookingId}/confirm:
    post:
      summary: Confirm session outcome (release or refund escrow transactionally)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: bookingId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmSessionRequest'
      responses:
        '200':
          description: Confirmation processed
        '400':
          description: Validation error
        '401':
          description: Missing or invalid token
        '403':
          description: Forbidden or not booking owner
        '404':
          description: Booking/profile/wallet not found
        '409':
          description: Session not yet due for confirmation
  /api/v1/withdrawals/request:
    post:
      summary: Tutor requests simulated withdrawal to personal account destination
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WithdrawalRequest'
      responses:
        '201':
          description: Withdrawal request created and wallet amount reserved
        '400':
          description: Validation error
        '401':
          description: Missing or invalid token
        '403':
          description: Forbidden for non-tutor role
        '409':
          description: Insufficient wallet balance
  /api/v1/withdrawals/my:
    get:
      summary: List tutor withdrawal requests
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Withdrawals fetched
        '401':
          description: Missing or invalid token
        '403':
          description: Forbidden for non-tutor role
  /api/v1/withdrawals/admin/pending:
    get:
      summary: Admin list of pending withdrawal requests
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Pending withdrawals fetched
        '401':
          description: Missing or invalid token
        '403':
          description: Forbidden for non-admin role
  /api/v1/withdrawals/admin/{withdrawalId}/review:
    patch:
      summary: Admin review simulated withdrawal request (approve or reject/refund)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: withdrawalId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WithdrawalReviewRequest'
      responses:
        '200':
          description: Review processed
        '400':
          description: Validation error
        '401':
          description: Missing or invalid token
        '403':
          description: Forbidden for non-admin role
        '404':
          description: Withdrawal/admin profile not found
        '409':
          description: Withdrawal already reviewed
  /api/v1/academies/list:
    get:
      summary: Student list of academies with active subscriptions
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Academies fetched
  /api/v1/academies/{academyId}/courses:
    get:
      summary: Student list of selected academy courses
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: academyId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Courses fetched
  /api/v1/academies/enroll:
    post:
      summary: Student enroll in academy course with fixed fee 1000
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcademyEnrollRequest'
      responses:
        '201':
          description: Enrollment created and payment completed
        '409':
          description: Balance/course-seat/duplicate conflict
  /api/v1/academies/enrollments/my:
    get:
      summary: Student or academy list enrollments
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Enrollments fetched
  /api/v1/academies/academy/courses/seed-demo:
    post:
      summary: Seed starter academy courses
      security:
        - BearerAuth: []
      responses:
        '201':
          description: Demo courses seeded (or already present)
        '401':
          description: Missing or invalid token
        '403':
          description: Forbidden for non-academy role
  /api/v1/chat/messages:
    post:
      summary: Send chat message (allowed only student-tutor or student-academy)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatSendRequest'
      responses:
        '201':
          description: Message sent
        '400':
          description: Validation error
        '403':
          description: Chat pair not allowed
  /api/v1/chat/conversations:
    get:
      summary: List conversations for logged in account
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Conversations fetched
  /api/v1/chat/messages/{peerAccountId}:
    get:
      summary: Get thread messages with peer account
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: peerAccountId
          required: true
          schema:
            type: integer
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Thread fetched
        '403':
          description: Chat pair not allowed
  /api/v1/reviews:
    post:
      summary: Student submits review for completed tutor session
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewCreateRequest'
      responses:
        '201':
          description: Review created and tutor rating summary updated
        '400':
          description: Validation error or non-tutor booking
        '401':
          description: Missing or invalid token
        '403':
          description: Forbidden for non-student role or non-owner booking
        '404':
          description: Booking or student profile not found
        '409':
          description: Session not completed yet or review already exists
  /api/v1/reviews/my:
    get:
      summary: Get my reviews (student submitted or tutor received)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Reviews fetched
        '401':
          description: Missing or invalid token
        '403':
          description: Forbidden for non student/tutor role
  /api/v1/discovery/tutors:
    get:
      summary: Student discovery list of tutors with filters
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: subject
          schema:
            type: string
        - in: query
          name: location
          schema:
            type: string
        - in: query
          name: teaching_mode
          schema:
            type: string
            enum: [online, physical, hybrid]
        - in: query
          name: min_rating
          schema:
            type: number
            minimum: 0
            maximum: 5
        - in: query
          name: min_price
          schema:
            type: number
            minimum: 0
        - in: query
          name: max_price
          schema:
            type: number
            minimum: 0
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Tutors fetched with filters
        '400':
          description: Invalid filters
        '401':
          description: Missing or invalid token
        '403':
          description: Forbidden for non-student role
  /api/v1/discovery/academies:
    get:
      summary: Student discovery list of academies with filters
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: subject
          schema:
            type: string
        - in: query
          name: location
          schema:
            type: string
        - in: query
          name: min_rating
          schema:
            type: number
            minimum: 0
            maximum: 5
        - in: query
          name: min_price
          schema:
            type: number
            minimum: 0
        - in: query
          name: max_price
          schema:
            type: number
            minimum: 0
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Academies fetched with filters
        '400':
          description: Invalid filters
        '401':
          description: Missing or invalid token
        '403':
          description: Forbidden for non-student role
